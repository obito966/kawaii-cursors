<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kawaii Cursors</title>
  <style>
    :root {
      --pink: #ff4da6;
      --purple: #6c5ce7;
      --bg: #070714;
      --card: #0d0d2b;
      --text: #f0eeff;
      --muted: #9890cc;
      --border: rgba(108,92,231,0.3);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      width: 320px;
      min-height: 420px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 14px;
    }
    .header {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      padding: 16px 18px;
    }
    .logo {
      font-weight: 900;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }
    .logo small { display:block; font-weight:400; font-size:0.75rem; opacity:0.85; margin-top:2px; }
    .section { padding: 14px 18px; }
    .label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:8px; font-weight:700; }
    .cursor-list { display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:12px; }
    .cursor-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cursor-item:hover { border-color: var(--pink); }
    .cursor-item.active { border-color: var(--pink); background: rgba(255,77,166,0.12); }
    .cursor-emoji { font-size: 1.8rem; margin-bottom: 4px; }
    .cursor-name { font-size: 0.72rem; color: var(--muted); }
    .divider { height:1px; background:var(--border); margin: 0 18px; }
    .btn {
      display:block; width:100%;
      padding:10px;
      border-radius:8px;
      font-weight:700;
      font-size:0.85rem;
      border:none; cursor:pointer;
      transition:all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      margin-bottom: 8px;
    }
    .btn-reset {
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-reset:hover { color: var(--text); border-color: var(--muted); }
    .footer {
      padding: 10px 18px;
      text-align:center;
      color:var(--muted);
      font-size:0.72rem;
      border-top:1px solid var(--border);
    }
    .footer a { color:var(--pink); text-decoration:none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      ✦ Kawaii Cursors
      <small>Premium cursor experience</small>
    </div>
  </div>

  <div class="section">
    <div class="label">Quick Select</div>
    <div class="cursor-list" id="cursorList">
      <div class="cursor-item" data-emoji="🌸" data-name="Sakura">
        <div class="cursor-emoji">🌸</div>
        <div class="cursor-name">Sakura</div>
      </div>
      <div class="cursor-item" data-emoji="⚡" data-name="Lightning">
        <div class="cursor-emoji">⚡</div>
        <div class="cursor-name">Lightning</div>
      </div>
      <div class="cursor-item" data-emoji="🌟" data-name="Neon Glow">
        <div class="cursor-emoji">🌟</div>
        <div class="cursor-name">Neon Glow</div>
      </div>
      <div class="cursor-item" data-emoji="🔮" data-name="Void">
        <div class="cursor-emoji">🔮</div>
        <div class="cursor-name">Void</div>
      </div>
      <div class="cursor-item" data-emoji="🎮" data-name="Gamer">
        <div class="cursor-emoji">🎮</div>
        <div class="cursor-name">Gamer</div>
      </div>
      <div class="cursor-item" data-emoji="👁️" data-name="Cyber Eye">
        <div class="cursor-emoji">👁️</div>
        <div class="cursor-name">Cyber Eye</div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <button class="btn btn-primary" id="applyBtn">✦ Apply to This Tab</button>
    <button class="btn btn-reset" id="resetBtn">↺ Reset Default Cursor</button>
  </div>

  <div class="footer">
    <a href="https://kawaiicursors.io" target="_blank">kawaiicursors.io</a> — More cursors online
  </div>

  <script src="popup.js"></script>
</body>
</html>
